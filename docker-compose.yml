services:
  api:
    build: ./app
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./.env:/app/.env:ro

  frontend:
    build:
      context: ./frontend
      args:
        VITE_SUPABASE_URL: ${SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
        VITE_API_BASE_URL: ${API_BASE_URL:-}
    ports:
      - "3000:80"
    env_file: .env.frontend
    depends_on:
      - api
